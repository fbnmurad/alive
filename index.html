<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferramentas BRM</title>
  <style>
    :root {
      --vivo-roxo: #660099;
      --vivo-roxo-escuro: #3d005c;
      --vivo-roxo-medio: #8a00e6;
      --vivo-roxo-claro: #f3e5f9;
      --vivo-azul: #006cff;
      --branco: #ffffff;
      --fundo: #f3f4f7;
      --card: #ffffff;
      --borda: #dfe3e8;
      --texto: #56606b;
      --texto-escuro: #2f3744;
      --texto-suave: #788391;
      --shadow-main: 0 8px 24px rgba(61, 0, 92, 0.24);
      --shadow-soft: 0 8px 22px rgba(31, 42, 68, 0.10);
      --main-gradient: linear-gradient(90deg, #3d005c, #660099, #8a00e6, #006cff);
      --surface: var(--card);
      --surface-soft: #f7f8fb;
      --surface-muted: #eef1f5;
      --surface-hover: #f3eafd;
      --color-bg: var(--fundo);
      --color-bg-elevated: var(--card);
      --color-text: var(--texto);
      --color-title: var(--texto-escuro);
      --color-muted: var(--texto-suave);
      --color-accent: var(--vivo-roxo);
      --color-accent-soft: var(--vivo-roxo-claro);
      --color-border: var(--borda);
      --focus-ring: 0 0 0 4px rgba(102, 0, 153, 0.10);
      --sidebar-width: 310px;
      --header-height: 56px;
    }

    body[data-theme="dark"] {
      --fundo: #1f102b;
      --card: #29143a;
      --borda: rgba(255, 255, 255, 0.18);
      --texto: rgba(255, 255, 255, 0.84);
      --texto-escuro: #ffffff;
      --texto-suave: rgba(255, 255, 255, 0.62);
      --surface: rgba(255, 255, 255, 0.08);
      --surface-soft: rgba(255, 255, 255, 0.10);
      --surface-muted: rgba(255, 255, 255, 0.12);
      --surface-hover: rgba(255, 255, 255, 0.15);
      --color-bg: #1f102b;
      --color-bg-elevated: #29143a;
      --color-text: rgba(255, 255, 255, 0.84);
      --color-title: #ffffff;
      --color-muted: rgba(255, 255, 255, 0.62);
      --color-accent: #d9a7ff;
      --color-accent-soft: rgba(255, 255, 255, 0.14);
      --color-border: rgba(255, 255, 255, 0.18);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--color-text);
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      height: var(--header-height);
      background: var(--main-gradient);
      color: var(--branco);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 14px;
      box-shadow: var(--shadow-main);
      z-index: 30;
      flex-shrink: 0;
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 17px;
      font-weight: 800;
      white-space: nowrap;
    }

    .app-title small {
      font-size: 12px;
      font-weight: 500;
      opacity: 0.82;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      font-family: inherit;
    }

    .header-btn,
    .icon-btn {
      border: 1px solid rgba(255, 255, 255, 0.42);
      background: transparent;
      color: var(--branco);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    .header-btn:hover,
    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.16);
      box-shadow: var(--shadow-main);
    }

    .header-btn:active,
    .icon-btn:active {
      transform: scale(0.97);
    }

    .app-layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      overflow: hidden;
    }

    .sidebar {
      background: var(--color-bg-elevated);
      border-right: 1px solid var(--color-border);
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      z-index: 20;
    }

    .sidebar-head {
      padding: 14px;
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }

    .sidebar-head h2 {
      color: var(--color-title);
      font-size: 15px;
      margin-bottom: 4px;
    }

    .sidebar-head p {
      color: var(--color-muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .search-area {
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }

    .search-wrap {
      position: relative;
      display: block;
    }

    .search-wrap span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-muted);
      pointer-events: none;
      font-size: 14px;
    }

    .search-input {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      background: var(--surface-soft);
      color: var(--color-title);
      padding: 11px 12px 11px 36px;
      font-size: 13px;
      outline: none;
    }

    .search-input::placeholder {
      color: var(--color-muted);
    }

    .search-input:focus-visible,
    .tool-row:focus-visible,
    .category-toggle:focus-visible,
    .header-btn:focus-visible,
    .icon-btn:focus-visible,
    .plain-btn:focus-visible,
    .tool-select:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
      box-shadow: var(--focus-ring);
    }

    .sidebar-tools {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 8px;
    }

    .category {
      margin-bottom: 6px;
    }

    .category-toggle {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--color-title);
      border-radius: 10px;
      padding: 9px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      font-weight: 900;
      text-align: left;
    }

    .category-toggle:hover {
      background: var(--surface-hover);
    }

    .category-toggle-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .category-caret {
      color: var(--color-muted);
      font-size: 11px;
      width: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease;
    }

    .category.collapsed .category-caret {
      transform: rotate(-90deg);
    }

    .category-count {
      color: var(--color-muted);
      font-size: 11px;
      font-weight: 800;
    }

    .tool-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 0 4px;
    }

    .category.collapsed .tool-list {
      display: none;
    }

    .tool-row {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--color-text);
      border-radius: 11px;
      padding: 8px 8px 8px 30px;
      cursor: pointer;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      text-align: left;
      transition: background 0.16s, border-color 0.16s, color 0.16s;
    }

    .tool-row:hover {
      background: var(--surface-hover);
    }

    .tool-row.active {
      background: var(--color-accent-soft);
      border-color: rgba(102, 0, 153, 0.18);
      color: var(--color-accent);
    }

    .tool-icon {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      background: var(--surface-muted);
      color: var(--color-accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .tool-row.active .tool-icon {
      background: var(--branco);
      color: var(--vivo-roxo);
    }

    body[data-theme="dark"] .tool-row.active .tool-icon {
      background: rgba(255, 255, 255, 0.16);
      color: var(--branco);
    }

    .tool-text {
      min-width: 0;
    }

    .tool-name {
      display: block;
      color: inherit;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tool-description {
      display: block;
      color: var(--color-muted);
      font-size: 11px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 2px;
    }

    .sidebar-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--color-border);
      color: var(--color-muted);
      font-size: 11px;
      line-height: 1.35;
      flex-shrink: 0;
    }

    .workspace {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: var(--color-bg);
    }

    .workspace-header {
      height: 52px;
      min-height: 52px;
      padding: 0 14px;
      background: var(--color-bg-elevated);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 2px 10px rgba(31, 42, 68, 0.05);
      z-index: 10;
    }

    .current-tool {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .current-tool-icon {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: var(--color-accent-soft);
      color: var(--color-accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .current-tool-text {
      min-width: 0;
    }

    .current-tool-title {
      color: var(--color-title);
      font-size: 14px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.2;
    }

    .current-tool-subtitle {
      color: var(--color-muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.25;
      margin-top: 2px;
    }

    .workspace-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .plain-btn {
      border: 1px solid var(--color-border);
      background: var(--surface-soft);
      color: var(--color-title);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.18s, color 0.18s, border-color 0.18s;
    }

    .plain-btn:hover {
      background: var(--color-accent-soft);
      color: var(--color-accent);
      border-color: rgba(102, 0, 153, 0.18);
    }

    .tool-select-wrap {
      display: none;
      align-items: center;
      gap: 7px;
      color: var(--color-muted);
      font-size: 12px;
      font-weight: 800;
    }

    .tool-select {
      appearance: none;
      min-width: 220px;
      border-radius: 999px;
      border: 1px solid var(--color-border);
      background: var(--surface-soft);
      color: var(--color-title);
      padding: 8px 34px 8px 12px;
      font-size: 12px;
      font-weight: 800;
      outline: none;
    }

    .frame-wrap {
      flex: 1;
      min-height: 0;
      padding: 12px;
      display: flex;
    }

    iframe {
      flex: 1;
      width: 100%;
      min-height: 0;
      border: 1px solid var(--color-border);
      border-radius: 14px;
      background: #ffffff;
      box-shadow: var(--shadow-soft);
    }

    .empty-state {
      flex: 1;
      border: 1px dashed var(--color-border);
      border-radius: 14px;
      background: var(--color-bg-elevated);
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--color-muted);
      padding: 24px;
    }

    .empty-state strong {
      display: block;
      color: var(--color-title);
      margin-bottom: 4px;
    }

    body.sidebar-collapsed {
      --sidebar-width: 0px;
    }

    body.sidebar-collapsed .sidebar {
      overflow: hidden;
      border-right-width: 0;
      box-shadow: none;
    }

    body.sidebar-collapsed .sidebar > * {
      display: none;
    }

    body.workspace-expanded header,
    body.workspace-expanded .sidebar {
      display: none !important;
    }

    body.workspace-expanded .app-layout {
      grid-template-columns: 1fr;
      height: 100vh;
    }

    body.workspace-expanded .workspace {
      height: 100vh;
    }

    body.workspace-expanded .frame-wrap {
      padding: 0;
    }

    body.workspace-expanded iframe {
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    @media (max-width: 980px) {
      :root {
        --sidebar-width: 290px;
      }

      .tool-select-wrap {
        display: flex;
      }

      .app-layout {
        position: relative;
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        top: var(--header-height);
        left: 0;
        bottom: 0;
        width: min(86vw, 330px);
        transform: translateX(-105%);
        transition: transform 0.22s ease;
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      body.sidebar-open::after {
        content: "";
        position: fixed;
        inset: var(--header-height) 0 0 0;
        background: rgba(0, 0, 0, 0.34);
        z-index: 15;
      }

      body.sidebar-open .sidebar {
        z-index: 25;
      }

      body.sidebar-collapsed {
        --sidebar-width: 290px;
      }

      body.sidebar-collapsed .sidebar > * {
        display: flex;
      }

      body.sidebar-collapsed .sidebar {
        border-right: 1px solid var(--color-border);
      }
    }

    @media (max-width: 620px) {
      header {
        height: auto;
        min-height: var(--header-height);
        align-items: flex-start;
        flex-direction: column;
        padding: 10px;
      }

      .app-title small {
        display: none;
      }

      .header-actions,
      .workspace-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .workspace-header {
        height: auto;
        min-height: 52px;
        align-items: flex-start;
        flex-direction: column;
        padding: 10px;
      }

      .tool-select-wrap {
        width: 100%;
      }

      .tool-select {
        width: 100%;
        min-width: 0;
      }

      .frame-wrap {
        padding: 8px;
      }
    }
  </style>
</head>
<body data-theme="light">
  <header>
    <div class="app-title">
      <span>⚙️ Ferramentas</span>
      <small>Utilitários BRM</small>
    </div>

    <div class="header-actions">
      <button id="sidebarToggle" class="header-btn" type="button" aria-label="Abrir ou fechar menu lateral">
        <span id="sidebarToggleIcon">☰</span>
        <span id="sidebarToggleLabel">Menu</span>
      </button>
      <button id="themeToggle" class="icon-btn" type="button" aria-label="Alternar tema claro/escuro">
        <span id="themeIcon">🌙</span>
        <span id="themeLabel">Modo escuro</span>
      </button>
    </div>
  </header>

  <main class="app-layout">
    <aside class="sidebar" aria-label="Menu de ferramentas">
      <div class="sidebar-head">
        <h2>Ferramentas</h2>
        <p>Use a busca ou navegue por categoria. A ferramenta abre no painel ao lado.</p>
      </div>

      <div class="search-area">
        <label class="search-wrap" for="toolSearch">
          <span>🔎</span>
          <input id="toolSearch" class="search-input" type="search" placeholder="Buscar..." autocomplete="off" />
        </label>
      </div>

      <nav id="sidebarTools" class="sidebar-tools" aria-label="Lista de ferramentas"></nav>

      <div class="sidebar-footer">
        <span id="toolCount">0 ferramentas</span>
      </div>
    </aside>

    <section class="workspace" aria-label="Área de trabalho da ferramenta">
      <div class="workspace-header">
        <div class="current-tool">
          <span id="currentToolIcon" class="current-tool-icon">📅</span>
          <div class="current-tool-text">
            <div id="currentToolTitle" class="current-tool-title">Calcular Datas</div>
            <div id="currentToolSubtitle" class="current-tool-subtitle">Cálculo e apoio para datas, ciclos e períodos.</div>
          </div>
        </div>

        <div class="workspace-actions">
          <label class="tool-select-wrap" for="toolSelect">
            Ferramenta
            <select id="toolSelect" class="tool-select" aria-label="Selecionar ferramenta"></select>
          </label>
          <button id="reloadToolBtn" class="plain-btn" type="button">↻ Recarregar</button>
          <button id="expandWorkspaceBtn" class="plain-btn" type="button" aria-pressed="false">⛶ Expandir</button>
        </div>
      </div>

      <div class="frame-wrap">
        <iframe id="toolFrame" name="conteudo" title="Ferramenta em exibição"></iframe>
      </div>
    </section>
  </main>

  <script>
    const tools = [
      {
        id: "calcular-datas",
        label: "Calcular Datas",
        description: "Cálculo e apoio para datas, ciclos e períodos.",
        category: "Cálculo",
        icon: "📅",
        url: "https://fbnmurad.github.io/alive/CalculadoraDatas.html"
      },
      {
        id: "calcular-pro-rata",
        label: "Calcular Pró-Rata",
        description: "Cálculo proporcional de valores por período.",
        category: "Cálculo",
        icon: "🧮",
        url: "https://fbnmurad.github.io/alive/ValorProRata.html"
      },
      {
        id: "diferimento-receita",
        label: "Diferimento de Receita",
        description: "Apoio para cálculo e análise de diferimento.",
        category: "Financeiro",
        icon: "📈",
        url: "https://fbnmurad.github.io/alive/DIFReceita.html"
      },
      {
        id: "comparar-json",
        label: "Comparar JSON",
        description: "Validação e comparação de estruturas JSON.",
        category: "Dados",
        icon: "{}",
        url: "https://fbnmurad.github.io/alive/JSONCompare.html"
      },
      {
        id: "gerar-cartao-credito",
        label: "Gerar Cartão de Crédito",
        description: "Geração de dados de cartão para testes controlados.",
        category: "Teste",
        icon: "💳",
        url: "https://fbnmurad.github.io/alive/GeradorCartaoCredito.html"
      },
      {
        id: "gerar-cpf-cnpj",
        label: "Gerar CPF/CNPJ",
        description: "Geração de documentos para massa de teste.",
        category: "Teste",
        icon: "🪪",
        url: "https://fbnmurad.github.io/alive/GeradorCpfCnpj.html"
      },
      {
        id: "comparador-merge",
        label: "Comparador & Merge",
        description: "Comparação, análise e união de textos.",
        category: "Texto",
        icon: "🔀",
        url: "https://fbnmurad.github.io/alive/CompararTexto.html"
      },
      {
        id: "contar-caracteres",
        label: "Contar Caracteres",
        description: "Contagem de caracteres, palavras e tamanho de texto.",
        category: "Texto",
        icon: "🔢",
        url: "https://fbnmurad.github.io/alive/ContarCaracter.html"
      },
      {
        id: "corretor-ortografico-gramatical",
        label: "Corretor Ortográfico & Gramatical",
        description: "Apoio para revisão textual, escrita e gramática.",
        category: "Texto",
        icon: "✍️",
        url: "https://fbnmurad.github.io/alive/Corretor.html"
      },
      {
        id: "renderizador-html-css-js",
        label: "Renderizador HTML/CSS/JS",
        description: "Editor para colar HTML, CSS e JavaScript e visualizar o resultado renderizado.",
        category: "Renderizadores",
        icon: "🌐",
        url: "renderizador_html_duas_colunas.html"
      },
      {
        id: "renderizador-jira-wiki",
        label: "Renderizador Jira/Wiki",
        description: "Formatação e renderização de conteúdo Wiki Markup.",
        category: "Renderizadores",
        icon: "🧾",
        url: "https://fbnmurad.github.io/alive/JiraWikiMarkup.html"
      },
      {
        id: "desformatador-jira-wiki",
        label: "Desformatador Jira/Wiki",
        description: "Remove formatação Wiki Markup e transforma em texto limpo.",
        category: "Renderizadores",
        icon: "🧹",
        url: "desformatador_jira_wiki_para_texto.html"
      },
      {
        id: "renderizador-mermaid",
        label: "Renderizador Mermaid",
        description: "Visualização de diagramas Mermaid em tempo real.",
        category: "Renderizadores",
        icon: "🧩",
        url: "https://fbnmurad.github.io/alive/mermaid-local.html"
      }
    ].sort((a, b) => {
      const byCategory = a.category.localeCompare(b.category, "pt-BR", { sensitivity: "base" });
      if (byCategory !== 0) return byCategory;
      return a.label.localeCompare(b.label, "pt-BR", { sensitivity: "base" });
    });

    const body = document.body;
    const sidebarTools = document.getElementById("sidebarTools");
    const toolSearch = document.getElementById("toolSearch");
    const toolFrame = document.getElementById("toolFrame");
    const toolSelect = document.getElementById("toolSelect");
    const currentToolIcon = document.getElementById("currentToolIcon");
    const currentToolTitle = document.getElementById("currentToolTitle");
    const currentToolSubtitle = document.getElementById("currentToolSubtitle");
    const toolCount = document.getElementById("toolCount");
    const sidebarToggle = document.getElementById("sidebarToggle");
    const sidebarToggleIcon = document.getElementById("sidebarToggleIcon");
    const sidebarToggleLabel = document.getElementById("sidebarToggleLabel");
    const reloadToolBtn = document.getElementById("reloadToolBtn");
    const expandWorkspaceBtn = document.getElementById("expandWorkspaceBtn");
    const themeToggle = document.getElementById("themeToggle");
    const themeIcon = document.getElementById("themeIcon");
    const themeLabel = document.getElementById("themeLabel");

    let activeToolId = tools[0]?.id || "";
    const collapsedCategories = new Set();

    function normalizeSearch(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getToolById(id) {
      return tools.find(tool => tool.id === id) || tools[0];
    }

    function getFilteredTools() {
      const query = normalizeSearch(toolSearch.value);
      return tools.filter(tool => {
        const searchText = normalizeSearch(`${tool.label} ${tool.description} ${tool.category}`);
        return !query || searchText.includes(query);
      });
    }

    function groupByCategory(list) {
      return list.reduce((groups, tool) => {
        if (!groups[tool.category]) groups[tool.category] = [];
        groups[tool.category].push(tool);
        return groups;
      }, {});
    }

    function renderTools() {
      const filtered = getFilteredTools();
      const groups = groupByCategory(filtered);
      const categories = Object.keys(groups).sort((a, b) => a.localeCompare(b, "pt-BR", { sensitivity: "base" }));

      toolCount.textContent = `${filtered.length} ferramenta(s)`;

      if (!filtered.length) {
        sidebarTools.innerHTML = `
          <div class="empty-state">
            <div>
              <strong>Nada encontrado</strong>
              Tente buscar por outro termo.
            </div>
          </div>
        `;
        return;
      }

      sidebarTools.innerHTML = categories.map(category => {
        const isCollapsed = collapsedCategories.has(category);
        const toolsHtml = groups[category].map(tool => `
          <button class="tool-row ${tool.id === activeToolId ? "active" : ""}" type="button" data-tool-id="${tool.id}" title="${escapeHtml(tool.label)}">
            <span class="tool-icon" aria-hidden="true">${escapeHtml(tool.icon)}</span>
            <span class="tool-text">
              <span class="tool-name">${escapeHtml(tool.label)}</span>
              <span class="tool-description">${escapeHtml(tool.description)}</span>
            </span>
          </button>
        `).join("");

        return `
          <section class="category ${isCollapsed ? "collapsed" : ""}" data-category-section="${escapeHtml(category)}">
            <button class="category-toggle" type="button" data-category-toggle="${escapeHtml(category)}" aria-expanded="${isCollapsed ? "false" : "true"}">
              <span class="category-toggle-left">
                <span class="category-caret">⌄</span>
                <span>${escapeHtml(category)}</span>
              </span>
              <span class="category-count">${groups[category].length}</span>
            </button>
            <div class="tool-list">
              ${toolsHtml}
            </div>
          </section>
        `;
      }).join("");
    }

    function renderSelect() {
      toolSelect.innerHTML = tools.map(tool => `
        <option value="${tool.id}">${escapeHtml(tool.label)}</option>
      `).join("");
      toolSelect.value = activeToolId;
    }

    function openTool(toolId, options = {}) {
      const tool = getToolById(toolId);
      if (!tool) return;

      activeToolId = tool.id;
      toolFrame.src = tool.url;
      toolSelect.value = tool.id;
      currentToolIcon.textContent = tool.icon;
      currentToolTitle.textContent = tool.label;
      currentToolSubtitle.textContent = tool.description;

      renderTools();

      if (options.closeSidebarOnMobile && window.matchMedia("(max-width: 980px)").matches) {
        body.classList.remove("sidebar-open");
      }
    }

    function reloadTool() {
      const tool = getToolById(activeToolId);
      if (!tool) return;
      toolFrame.src = tool.url;
    }

    function toggleSidebar() {
      if (window.matchMedia("(max-width: 980px)").matches) {
        body.classList.toggle("sidebar-open");
        return;
      }

      body.classList.toggle("sidebar-collapsed");
      const collapsed = body.classList.contains("sidebar-collapsed");
      sidebarToggleIcon.textContent = collapsed ? "☰" : "◀";
      sidebarToggleLabel.textContent = collapsed ? "Menu" : "Ocultar";
    }

    function setWorkspaceExpanded(expanded) {
      body.classList.toggle("workspace-expanded", expanded);
      expandWorkspaceBtn.textContent = expanded ? "↙ Reduzir" : "⛶ Expandir";
      expandWorkspaceBtn.setAttribute("aria-pressed", expanded ? "true" : "false");
    }

    function toggleWorkspaceExpanded() {
      setWorkspaceExpanded(!body.classList.contains("workspace-expanded"));
    }

    function applyTheme(theme) {
      body.setAttribute("data-theme", theme);
      if (theme === "dark") {
        themeIcon.textContent = "☀️";
        themeLabel.textContent = "Modo claro";
      } else {
        themeIcon.textContent = "🌙";
        themeLabel.textContent = "Modo escuro";
      }
      localStorage.setItem("app-theme", theme);
    }

    function initTheme() {
      const stored = localStorage.getItem("app-theme");
      if (stored === "dark" || stored === "light") {
        applyTheme(stored);
      } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
        applyTheme("dark");
      } else {
        applyTheme("light");
      }
    }

    function bindEvents() {
      sidebarToggle.addEventListener("click", toggleSidebar);
      reloadToolBtn.addEventListener("click", reloadTool);
      expandWorkspaceBtn.addEventListener("click", toggleWorkspaceExpanded);

      themeToggle.addEventListener("click", () => {
        const current = body.getAttribute("data-theme");
        applyTheme(current === "dark" ? "light" : "dark");
      });

      toolSearch.addEventListener("input", renderTools);

      toolSelect.addEventListener("change", event => {
        openTool(event.target.value, { closeSidebarOnMobile: true });
      });

      sidebarTools.addEventListener("click", event => {
        const categoryButton = event.target.closest("[data-category-toggle]");
        if (categoryButton) {
          const category = categoryButton.dataset.categoryToggle;
          if (collapsedCategories.has(category)) {
            collapsedCategories.delete(category);
          } else {
            collapsedCategories.add(category);
          }
          renderTools();
          return;
        }

        const toolButton = event.target.closest("[data-tool-id]");
        if (toolButton) {
          openTool(toolButton.dataset.toolId, { closeSidebarOnMobile: true });
        }
      });

      document.addEventListener("keydown", event => {
        if (event.key === "Escape") {
          if (body.classList.contains("workspace-expanded")) {
            setWorkspaceExpanded(false);
          } else if (body.classList.contains("sidebar-open")) {
            body.classList.remove("sidebar-open");
          }
        }
      });

      document.addEventListener("click", event => {
        if (!window.matchMedia("(max-width: 980px)").matches) return;
        if (!body.classList.contains("sidebar-open")) return;
        const clickedSidebar = event.target.closest(".sidebar");
        const clickedToggle = event.target.closest("#sidebarToggle");
        if (!clickedSidebar && !clickedToggle) {
          body.classList.remove("sidebar-open");
        }
      });
    }

    function init() {
      renderSelect();
      renderTools();
      bindEvents();
      initTheme();
      openTool(activeToolId);
    }

    init();
  </script>
</body>
</html>
