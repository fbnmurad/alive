<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Dias</title>
  <style>
    :root {
      /* Background */
      --bg-gradient-start: #eef1f7;   /* cinza frio claro */
      --bg-gradient-end:   #f7f9fc;   /* quase branco */

      /* Roxo azulado (identidade) */
      --primary: #5b6ee1;             /* purple-blue tech */
      --primary-hover: #4b5fd1;
      --primary-active: #3f52b8;

      /* Textos */
      --text-title: #1f2a44;          /* azul grafite */
      --text-default: #3a4563;        /* cinza azulado */
      --text-dark: #111827;           /* quase preto */
      --text-muted: #6b7280;          /* cinza neutro */

      /* Superfícies */
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --surface-muted: #f1f4f9;
      --surface-highlight: #e9edff;   /* destaque roxo azulado */

      /* Bordas */
      --border-light: #d6dbea;

      /* Feedback semântico */
      --success: #16a34a;
      --error: #dc2626;
      --info: #5b6ee1;

      /* Neutros */
      --neutral: #9ca3af;
      --neutral-hover: #6b7280;

      /* Shadow padrão do tema */
      --shadow-soft: 0 8px 24px rgba(31,42,68,0.08);
    }

    body {
      background: linear-gradient(120deg, var(--bg-gradient-start), var(--bg-gradient-end));
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
      color: var(--text-default);
    }

    .container {
      background: var(--surface);
      margin-top: 40px;
      padding: 32px 30px 24px 30px;
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
      width: 100%;
      max-width: 420px;
      border: 1px solid var(--border-light);
    }

    h2 {
      color: var(--text-title);
      margin-bottom: 25px;
      text-align: center;
      font-weight: 650;
      letter-spacing: 0.3px;
    }

    label {
      font-weight: 600;
      color: var(--text-dark);
      display: block;
      margin-bottom: 5px;
      margin-top: 16px;
      font-size: 15px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      font-size: 15px;
      margin-bottom: 2px;
      border-radius: 10px;
      border: 1px solid var(--border-light);
      background: var(--surface-muted);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      color: var(--text-dark);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(91,110,225,0.18);
    }

    .botoes {
      display: flex;
      gap: 10px;
      margin-top: 22px;
      width: 100%;
    }

    button {
      flex: 1;
      background: var(--primary);
      color: #fff;
      font-size: 16px;
      font-weight: 650;
      border: none;
      border-radius: 10px;
      padding: 12px 0;
      cursor: pointer;
      transition: background 0.18s, transform 0.06s, box-shadow 0.18s;
      box-shadow: 0 6px 16px rgba(31,42,68,0.12);
    }

    button:hover:not(.limpar) {
      background: var(--primary-hover);
    }

    button:active:not(.limpar) {
      background: var(--primary-active);
      transform: translateY(1px);
    }

    button.limpar {
      background: var(--surface-soft);
      color: var(--text-default);
      border: 1px solid var(--border-light);
      box-shadow: none;
    }

    button.limpar:hover {
      background: var(--surface-highlight);
      color: var(--text-title);
    }

    #resultado {
      margin-top: 30px;
      padding: 18px 13px 13px 13px;
      border-radius: 12px;
      background: var(--surface-soft);
      color: var(--text-dark);
      font-size: 18px;
      text-align: center;
      box-shadow: 0 6px 18px rgba(31,42,68,0.08);
      border: 1px solid var(--border-light);
    }

    .totais-gerais {
      text-align: left !important;
      margin: 0 0 14px 0;
      color: var(--text-default);
    }

    .lista-feriados {
      margin-top: 16px;
      color: var(--text-default);
      font-size: 15px;
      background: var(--surface-muted);
      border-radius: 10px;
      padding: 8px 10px 5px 14px;
      text-align: left !important;
      border: 1px solid var(--border-light);
    }

    .meses-detalhados {
      margin-top: 15px;
      color: var(--text-default);
      font-size: 15px;
      background: var(--surface-highlight);
      border-radius: 10px;
      padding: 8px 10px 5px 14px;
      text-align: left !important;
      border: 1px solid var(--border-light);
    }

    /* Mensagens de erro no resultado */
    .erro {
      color: var(--error);
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .container { padding: 12px 10px 12px 10px; max-width: 99vw; }
      h2 { font-size: 1.1em; }
      #resultado { font-size: 16px; padding: 11px 10px 7px 10px; }
      .lista-feriados, .meses-detalhados, .totais-gerais { font-size: 13px; padding-left: 10px; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Calculadora de Dias Úteis e Não Úteis</h2>

    <label for="inicio">Data de Início:</label>
    <input type="date" id="inicio">

    <label for="fim">Data de Fim:</label>
    <input type="date" id="fim">

    <div class="botoes">
      <button onclick="calcularDias()">Calcular</button>
      <button type="button" class="limpar" onclick="limparCampos()">Limpar</button>
    </div>

    <div id="resultado"></div>
  </div>

  <script>
    function calcularPascoa(ano) {
      var a = ano % 19;
      var b = Math.floor(ano / 100);
      var c = ano % 100;
      var d = Math.floor(b / 4);
      var e = b % 4;
      var f = Math.floor((b + 8) / 25);
      var g = Math.floor((b - f + 1) / 3);
      var h = (19 * a + b - d - g + 15) % 30;
      var i = Math.floor(c / 4);
      var k = c % 4;
      var l = (32 + 2 * e + 2 * i - h - k) % 7;
      var m = Math.floor((a + 11 * h + 22 * l) / 451);
      var mes = Math.floor((h + l - 7 * m + 114) / 31);
      var dia = ((h + l - 7 * m + 114) % 31) + 1;
      return new Date(ano, mes - 1, dia);
    }

    function feriadosNacionais(ano) {
      var feriados = [
        `${ano}-01-01`, `${ano}-04-21`, `${ano}-05-01`, `${ano}-09-07`, `${ano}-10-12`,
        `${ano}-11-02`, `${ano}-11-15`, `${ano}-12-25`
      ];
      var pascoa = calcularPascoa(ano);
      var carnaval = new Date(pascoa); carnaval.setDate(pascoa.getDate() - 47);
      var sextaSanta = new Date(pascoa); sextaSanta.setDate(pascoa.getDate() - 2);
      var corpusChristi = new Date(pascoa); corpusChristi.setDate(pascoa.getDate() + 60);
      function fmt(dt) { return dt.toISOString().slice(0,10); }
      feriados.push(fmt(carnaval)); feriados.push(fmt(sextaSanta));
      feriados.push(fmt(pascoa)); feriados.push(fmt(corpusChristi));
      return feriados;
    }

    function calcularDias() {
      const inicio = document.getElementById("inicio").value;
      const fim = document.getElementById("fim").value;
      const resultado = document.getElementById("resultado");

      if (!inicio || !fim) {
        resultado.innerHTML = "<span class='erro'>Preencha as duas datas!</span>";
        return;
      }

      const dataInicio = new Date(inicio + "T00:00:00");
      const dataFim = new Date(fim + "T00:00:00");

      if (dataFim < dataInicio) {
        resultado.innerHTML = "<span class='erro'>A data final não pode ser anterior à inicial.</span>";
        return;
      }

      let anos = [];
      for(let y = dataInicio.getFullYear(); y <= dataFim.getFullYear(); y++) anos.push(y);

      let feriadosTodos = [];
      anos.forEach(y => feriadosTodos = feriadosTodos.concat(feriadosNacionais(y)));
      let feriadosSet = new Set(feriadosTodos);

      let diasCorridos = 0, diasUteis = 0, diasNaoUteis = 0;
      let diasFeriados = 0;
      let listaFeriadosNoPeriodo = [];
      let detalhesMeses = {};
      let dt = new Date(dataInicio);

      while (dt <= dataFim) {
        diasCorridos++;
        let iso = dt.toISOString().slice(0,10);
        let mesAnoKey = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;

        if (!detalhesMeses[mesAnoKey]) {
          detalhesMeses[mesAnoKey] = {corridos:0, uteis:0, naoUteis:0, feriados:0};
        }

        detalhesMeses[mesAnoKey].corridos++;

        if (dt.getDay() !== 0 && dt.getDay() !== 6) {
          if (feriadosSet.has(iso)) {
            diasFeriados++;
            diasNaoUteis++;
            detalhesMeses[mesAnoKey].feriados++;
            detalhesMeses[mesAnoKey].naoUteis++;
            listaFeriadosNoPeriodo.push(new Date(dt));
          } else {
            diasUteis++;
            detalhesMeses[mesAnoKey].uteis++;
          }
        } else {
          diasNaoUteis++;
          detalhesMeses[mesAnoKey].naoUteis++;
          if (feriadosSet.has(iso)) {
            detalhesMeses[mesAnoKey].feriados++;
            listaFeriadosNoPeriodo.push(new Date(dt));
          }
        }

        dt.setDate(dt.getDate() + 1);
      }

      let mesesDetalhadosStr = '<div class="meses-detalhados"><b>Dias por mês no período:</b><br>';
      Object.keys(detalhesMeses).sort().forEach(key => {
        let m = detalhesMeses[key];
        let [ano, mes] = key.split("-");
        let nomeMes = new Date(ano, parseInt(mes)-1).toLocaleString('pt-BR', { month: 'long' });
        mesesDetalhadosStr += `<b>${nomeMes[0].toUpperCase() + nomeMes.slice(1)} / ${ano}</b>:
        Dias corridos: ${m.corridos}, Dias úteis: ${m.uteis}, Dias não úteis: ${m.naoUteis}`;
        if (m.feriados) mesesDetalhadosStr += `, Feriados: ${m.feriados}`;
        mesesDetalhadosStr += '<br>';
      });
      mesesDetalhadosStr += '</div>';

      let listaStr = '';
      if (listaFeriadosNoPeriodo.length > 0) {
        listaStr = '<div class="lista-feriados"><b>Feriados nacionais no período:</b><br>';
        listaFeriadosNoPeriodo.forEach(f => { listaStr += `• ${f.toLocaleDateString()}<br>`; });
        listaStr += '</div>';
      }

      resultado.innerHTML = `
        <b>Período selecionado:</b> ${dataInicio.toLocaleDateString()} a ${dataFim.toLocaleDateString()}<br><br>
        <div class="totais-gerais">
          Dias corridos: <b>${diasCorridos}</b><br>
          Dias úteis (segunda a sexta, exceto feriados): <b>${diasUteis}</b><br>
          Dias não úteis (fins de semana e feriados): <b>${diasNaoUteis}</b><br>
          Feriados nacionais no período: <b>${diasFeriados}</b>
        </div>
        ${mesesDetalhadosStr}
        ${listaStr}
      `;
    }

    function limparCampos() {
      document.getElementById("inicio").value = '';
      document.getElementById("fim").value = '';
      document.getElementById("resultado").innerHTML = '';
    }

    // Bloqueio de teclas perigosas
    document.addEventListener('keydown', e => {
      if (
        e.keyCode === 123 || // F12
        (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || // Ctrl+Shift+I / Ctrl+Shift+J
        (e.ctrlKey && e.keyCode === 85) // Ctrl+U
      ) {
        e.preventDefault();
      }
    });

    // Bloqueio do menu de contexto (botão direito)
    document.addEventListener('contextmenu', e => e.preventDefault());
  </script>
</body>
</html>
