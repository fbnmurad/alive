<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barra Inferior - Billing Care</title>

  <style>
    :root {
      --vivo-roxo: #660099;
      --vivo-roxo-escuro: #3d005c;
      --vivo-roxo-medio: #8a00e6;
      --vivo-azul: #006cff;
      --branco: #ffffff;
      --texto: #3f4650;
      --borda: #dfe3e8;
      --sombra: 0 -2px 8px rgba(61, 0, 92, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f4f7;
      color: var(--texto);
      display: flex;
      flex-direction: column;
    }

    .page-content {
      flex: 1;
      padding: 24px;
    }

    .footer-bar {
      width: 100%;
      min-height: 56px;
      background: #ffffff;
      border-top: 1px solid var(--borda);
      box-shadow: var(--sombra);
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 24px;
      padding: 8px 24px;
    }

    .footer-logo-box {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      height: 38px;
    }

    .footer-logo {
      max-height: 32px;
      max-width: 170px;
      object-fit: contain;
      display: block;
    }

    .footer-app-name {
      text-align: center;
      color: var(--vivo-roxo);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      .footer-bar {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 12px 16px;
      }

      .footer-logo-box {
        min-width: 0;
        height: auto;
      }

      .footer-logo {
        max-height: 28px;
      }

      .footer-app-name {
        white-space: normal;
        font-size: 13px;
        line-height: 1.3;
      }
    }
  </style>
</head>

<body>
  <main class="page-content">
    <!-- Conteúdo do protótipo aqui -->
  </main>

  <footer class="footer-bar" aria-label="Barra inferior do sistema">
    <div class="footer-logo-box">
      <img
        class="footer-logo"
        src="https://www.vivoplataformadigital.com.br/cms/themes/jcdefault/images/footer/telefonica_2021_logo.png"
        alt="Telefônica"
      />
    </div>

    <div class="footer-app-name">
      Billing Care - Ciclo de Receita - Fênix
    </div>

    <div class="footer-logo-box">
      <img
        class="footer-logo"
        src="https://www.vivoplataformadigital.com.br/cms/themes/jcdefault/images/footer/5G_fibra.png"
        alt="5G e Fibra"
      />
    </div>
  </footer>
</body>
</html>
