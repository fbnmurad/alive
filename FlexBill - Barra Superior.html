<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flex Bill - Fênix</title>

  <style>
    :root {
      --vivo-roxo: #660099;
      --vivo-roxo-escuro: #3d005c;
      --vivo-roxo-medio: #8a00e6;
      --vivo-azul: #006cff;
      --branco: #ffffff;
      --texto: #3f4650;
      --sombra: 0 2px 8px rgba(61, 0, 92, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f4f7;
      color: var(--texto);
    }

    .topbar {
      width: 100%;
      min-height: 50px;
      background: linear-gradient(
        90deg,
        var(--vivo-roxo-escuro),
        var(--vivo-roxo),
        var(--vivo-roxo-medio),
        var(--vivo-azul)
      );
      color: var(--branco);
      display: grid;
      grid-template-columns: auto auto 1fr auto auto;
      align-items: center;
      gap: 16px;
      padding: 6px 16px;
      box-shadow: var(--sombra);
    }

    .menu-button {
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: var(--branco);
      font-size: 26px;
      line-height: 1;
      font-weight: 700;
      cursor: pointer;
      display: grid;
      place-items: center;
      border-radius: 6px;
    }

    .menu-button:hover,
    .menu-button:focus-visible {
      background: rgba(255, 255, 255, 0.16);
      outline: 2px solid rgba(255, 255, 255, 0.45);
      outline-offset: 2px;
    }

    .logo-box {
      height: 36px;
      min-width: 168px;
      padding: 4px 12px;
      background: #ffffff;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.16);
    }

    .brand-logo {
      height: 24px;
      max-width: 145px;
      object-fit: contain;
      display: block;
    }

    .app-name {
      text-align: center;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .user-info {
      min-height: 32px;
      max-width: 320px;
      padding: 6px 14px;
      border-radius: 999px;
      background: #ffffff;
      color: var(--vivo-roxo);
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .logout-button {
      min-height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.16);
      color: #ffffff;
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .logout-button:hover,
    .logout-button:focus-visible {
      background: rgba(255, 255, 255, 0.26);
      transform: translateY(-1px);
      outline: 2px solid rgba(255, 255, 255, 0.45);
      outline-offset: 2px;
    }

    @media (max-width: 820px) {
      .topbar {
        grid-template-columns: auto auto 1fr auto;
        gap: 10px;
      }

      .app-name {
        text-align: left;
        font-size: 14px;
      }

      .user-info {
        display: none;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        grid-template-columns: auto 1fr auto;
      }

      .logo-box {
        min-width: 130px;
        padding: 4px 10px;
      }

      .brand-logo {
        height: 21px;
        max-width: 110px;
      }

      .app-name {
        display: none;
      }

      .logout-button {
        padding: 6px 10px;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <button class="menu-button" type="button" aria-label="Abrir menu">
      ☰
    </button>

    <div class="logo-box">
      <img
        class="brand-logo"
        src="https://www.vivoplataformadigital.com.br/cms/themes/jcdefault/images/new_logo_vivo_emp.png"
        alt="Vivo Empresas"
      />
    </div>

    <div class="app-name">
      Flex Bill - Fênix
    </div>

    <div class="user-info" title="JULIO CESAR FERREIRA DOS SANTOS">
      JULIO CESAR FERREIRA DOS SANTOS
    </div>

    <button class="logout-button" type="button" aria-label="Sair do sistema">
      Sair
    </button>
  </header>
</body>
</html>
